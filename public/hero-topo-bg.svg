<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" width="800" height="900">

  <!-- Pure black background -->
  <rect width="800" height="900" fill="#000000"/>

  <!-- Main rings -->
  <ellipse cx="520" cy="450" rx="380" ry="420" fill="none" stroke="white" stroke-width="1"   opacity="0.12"/>
  <ellipse cx="520" cy="450" rx="340" ry="376" fill="none" stroke="white" stroke-width="1"   opacity="0.13"/>
  <ellipse cx="520" cy="450" rx="300" ry="332" fill="none" stroke="white" stroke-width="1"   opacity="0.14"/>
  <ellipse cx="520" cy="450" rx="260" ry="288" fill="none" stroke="white" stroke-width="1"   opacity="0.15"/>
  <ellipse cx="520" cy="450" rx="220" ry="244" fill="none" stroke="white" stroke-width="1"   opacity="0.16"/>
  <ellipse cx="520" cy="450" rx="180" ry="200" fill="none" stroke="white" stroke-width="1.2" opacity="0.17"/>
  <ellipse cx="520" cy="450" rx="140" ry="156" fill="none" stroke="white" stroke-width="1.2" opacity="0.18"/>
  <ellipse cx="520" cy="450" rx="100" ry="112" fill="none" stroke="white" stroke-width="1.4" opacity="0.20"/>
  <ellipse cx="520" cy="450" rx="60"  ry="68"  fill="none" stroke="white" stroke-width="1.4" opacity="0.22"/>
  <ellipse cx="520" cy="450" rx="24"  ry="28"  fill="none" stroke="white" stroke-width="1.6" opacity="0.25"/>

  <!-- Rotated layer 1 -->
  <ellipse cx="520" cy="450" rx="380" ry="420" fill="none" stroke="white" stroke-width="0.6" opacity="0.07" transform="rotate(15 520 450)"/>
  <ellipse cx="520" cy="450" rx="320" ry="356" fill="none" stroke="white" stroke-width="0.6" opacity="0.07" transform="rotate(15 520 450)"/>
  <ellipse cx="520" cy="450" rx="260" ry="292" fill="none" stroke="white" stroke-width="0.6" opacity="0.07" transform="rotate(15 520 450)"/>
  <ellipse cx="520" cy="450" rx="200" ry="228" fill="none" stroke="white" stroke-width="0.6" opacity="0.08" transform="rotate(15 520 450)"/>
  <ellipse cx="520" cy="450" rx="140" ry="164" fill="none" stroke="white" stroke-width="0.8" opacity="0.09" transform="rotate(15 520 450)"/>
  <ellipse cx="520" cy="450" rx="80"  ry="100" fill="none" stroke="white" stroke-width="0.8" opacity="0.10" transform="rotate(15 520 450)"/>

  <!-- Rotated layer 2 -->
  <ellipse cx="520" cy="450" rx="360" ry="400" fill="none" stroke="white" stroke-width="0.5" opacity="0.06" transform="rotate(-12 520 450)"/>
  <ellipse cx="520" cy="450" rx="300" ry="336" fill="none" stroke="white" stroke-width="0.5" opacity="0.06" transform="rotate(-12 520 450)"/>
  <ellipse cx="520" cy="450" rx="240" ry="272" fill="none" stroke="white" stroke-width="0.5" opacity="0.06" transform="rotate(-12 520 450)"/>
  <ellipse cx="520" cy="450" rx="180" ry="208" fill="none" stroke="white" stroke-width="0.5" opacity="0.07" transform="rotate(-12 520 450)"/>
  <ellipse cx="520" cy="450" rx="120" ry="144" fill="none" stroke="white" stroke-width="0.5" opacity="0.08" transform="rotate(-12 520 450)"/>

  <!-- Amber glow center -->
  <radialGradient id="glow" cx="65%" cy="50%" r="40%">
    <stop offset="0%"   stop-color="#EF9F27" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#EF9F27" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="520" cy="450" rx="180" ry="200" fill="url(#glow)"/>

  <!-- Fade left to pure black -->
  <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#000000" stop-opacity="1"/>
    <stop offset="50%"  stop-color="#000000" stop-opacity="0"/>
  </linearGradient>
  <rect width="800" height="900" fill="url(#fadeLeft)"/>

  <!-- Fade top and bottom to pure black -->
  <linearGradient id="fadeTopBottom" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#000000" stop-opacity="1"/>
    <stop offset="12%"  stop-color="#000000" stop-opacity="0"/>
    <stop offset="88%"  stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
  </linearGradient>
  <rect width="800" height="900" fill="url(#fadeTopBottom)"/>

</svg>
